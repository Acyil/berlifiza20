<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="loading-screen" class="loading-screen">
        <div class="heart-loader">❤️</div>
        <p>Mempersiapkan kejutan...</p>
    </div>

    <div id="particles-container"></div>

    <audio id="bg-music" loop>
        <source src="Sweet - Cigarettes After Sex - Cigarettes After Sex.mp3" type="audio/mpeg">
        Browser kamu tidak mendukung audio.
    </audio>

    <section id="page-1" class="page active">
        <div class="content-wrapper text-center animate-fade-in">
            <h1 class="romantic-title">Happy Birthday My Love ❤️</h1>
            <h2 class="partner-name">[Berlifiza Tirta Fiansa]</h2>
            <p class="subtitle">A Special Day for Someone Very Special</p>
            
            <div class="countdown animate-floating">
                <span>Sending lots of love... ✨</span>
            </div>

            <button id="btn-to-page2" class="btn btn-primary">Open My Surprise ✨</button>
        </div>
    </section>

    <section id="page-2" class="page hidden">
        <div class="card glassmorphism animate-slide-up">
            <div class="card-body">
                <span class="card-icon">💝</span>
                <p id="typing-text" class="romantic-text"></p>
                
                <button id="btn-to-page3" class="btn btn-primary hidden-btn">See My Gift 🎁</button>
            </div>
        </div>
    </section>

    <section id="page-3" class="page hidden">
        <div class="content-wrapper text-center animate-fade-in">
            <h2 class="romantic-title section-title">Thank You For Being Part of My Life ❤️</h2>
            
            <div class="video-container glassmorphism animate-slide-up">
                <video id="birthday-video" controls>
                    <source src="vid1.mp4" type="video/mp4">
                    Browser kamu tidak mendukung video tag.
                </video>
            </div>

            <div class="action-buttons animate-fade-in" style="margin-top: 30px;">
                <button id="btn-replay" class="btn btn-secondary">Replay Journey 🔄</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
